<!DOCTYPE html>
<html>
<head>
<title>BARSA OS</title>
<link rel="stylesheet" href="./styles/main.css">
</head>

<body>

<div id="arcade-frame">

    <h1>
        BARSA OS
    </h1>

    <p id="edition">
        Developer Arcade Edition
    </p>

    <div id="pacman-layer">
        <div id="pacman-drop">
            <img
                id="pacman"
                src="./assets/arcade/svg/pacman.svg"
                alt="Pac-Man">
        </div>
    </div>

    <div id="mini-container"></div>

    <p id="press-start">
        PRESS START
    </p>

    <div id="terminal-line">
        <img
            id="mini-agent"
            src="./assets/arcade/svg/pacman-mini.svg"
            alt="Mini Pac-Man">
        <pre id="boot-text"></pre>
    </div>

</div>

<script src="./engine/pacman.js"></script>
<script src="./engine/terminal.js"></script>
</body>
</html>
