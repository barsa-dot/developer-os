<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BARSA OS</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>

<div id="boot-screen">
    <div id="arcade-frame">

        <h1>BARSA OS</h1>

        <p id="edition">
            Developer Arcade Edition
        </p>

        <!-- Wrapped Pac-Man Layer with Isolated Drop Container -->
        <div id="pacman-layer">
            <div id="pacman-drop">
                <img
                    id="pacman"
                    src="./assets/arcade/svg/pacman.svg"
                    alt="Pac-Man">
            </div>
        </div>

        <!-- Added Mini Container -->
        <div id="mini-container"></div>

        <p id="press-start">
            PRESS START
        </p>

        <!-- Two-Column Terminal Row -->
        <div id="terminal-line">
            <pre id="boot-text"></pre>
        </div>

    </div>
</div>

<!-- Core Engine Scripts -->
<script src="./engine/sceneManager.js"></script>
<script src="./engine/pacman.js"></script>
<script src="./engine/terminal.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Initial boot scene wrapping the existing animation timing
        const defaultBootScene = {
            async enter() {
                setTimeout(() => {
                    if (typeof window.startBootSequence === "function") {
                        window.startBootSequence();
                    }
                }, 4500);
            },
            async exit() {}
        };

        // Register initial scene via SceneManager
        window.sceneManager.register("boot", defaultBootScene);
        window.sceneManager.switchTo("boot");
    });
</script>
</body>
</html>
