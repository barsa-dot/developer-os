<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="900"
    height="520"
    viewBox="0 0 900 520">

    <!-- Background -->
    <rect
        width="900"
        height="520"
        fill="#0d1117"/>

    <!-- Shadow -->
    <rect
        x="58"
        y="48"
        width="784"
        height="404"
        rx="18"
        fill="#000000"
        opacity="0.35"/>

    <!-- Window -->
    <rect
        x="50"
        y="40"
        width="800"
        height="420"
        rx="18"
        fill="#161b22"
        stroke="#30363d"
        stroke-width="2"/>

    <!-- Title Bar -->
    <rect
        x="50"
        y="40"
        width="800"
        height="54"
        rx="18"
        fill="#21262d"/>

    <!-- Fix bottom corners of title bar -->
    <rect
        x="50"
        y="70"
        width="800"
        height="24"
        fill="#21262d"/>

    <!-- macOS Buttons -->
    <circle cx="80" cy="67" r="7" fill="#ff5f57"/>
    <circle cx="104" cy="67" r="7" fill="#febc2e"/>
    <circle cx="128" cy="67" r="7" fill="#28c840"/>

    <!-- Title -->
    <text
        x="450"
        y="73"
        fill="#c9d1d9"
        text-anchor="middle"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="18"
        font-weight="600">

        BARSA OS
    </text>

    <!-- Divider -->
    <line
        x1="50"
        y1="94"
        x2="850"
        y2="94"
        stroke="#30363d"
        stroke-width="1"/>

    <!-- Prompt -->
    <text
        x="80"
        y="150"
        fill="#58a6ff"
        font-family="JetBrains Mono, Consolas, monospace"
        font-size="20">

        barsa@barsa-os:~$
    </text>

    <!-- Cursor -->
    <rect
        x="300"
        y="133"
        width="12"
        height="24"
        fill="#c9d1d9"/>

</svg>