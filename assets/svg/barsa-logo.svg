<svg
    width="300"
    height="300"
    viewBox="0 0 300 300"
    xmlns="http://www.w3.org/2000/svg">


<defs>

    <filter id="glow">

        <feGaussianBlur
            stdDeviation="6"
            result="blur"/>

        <feMerge>

            <feMergeNode in="blur"/>

            <feMergeNode in="SourceGraphic"/>

        </feMerge>

    </filter>

</defs>



<g
    transform="translate(150 150)"
    filter="url(#glow)">



    <!-- Outer Crystal -->

    <polygon

        points="
        0,-90
        90,0
        0,90
        -90,0"

        fill="none"

        stroke="#58A6FF"

        stroke-width="5"

    />



    <!-- Inner crystal -->

    <polygon

        points="
        0,-55
        55,0
        0,55
        -55,0"

        fill="#58A6FF"

        opacity="0.35"

    />



    <!-- Hidden S -->

    <path

        d="
        M-40,-35
        C20,-70 70,-10 25,15
        C-10,35 -45,5 -55,45"

        fill="none"

        stroke="#FFFFFF"

        stroke-width="10"

        stroke-linecap="round"

    />



</g>


</svg>