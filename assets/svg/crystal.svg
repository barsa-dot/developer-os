<svg width="120" height="120" viewBox="0 0 120 120"
     xmlns="http://www.w3.org/2000/svg">

    <defs>

        <filter id="glow">

            <feGaussianBlur stdDeviation="3"
                            result="blur"/>

            <feMerge>

                <feMergeNode in="blur"/>

                <feMergeNode in="SourceGraphic"/>

            </feMerge>

        </filter>

    </defs>

    <polygon
        points="60,12 98,60 60,108 22,60"
        fill="#58A6FF"
        opacity="0.15"/>

    <polygon
        points="60,18 90,60 60,102 30,60"
        fill="none"
        stroke="#58A6FF"
        stroke-width="3"
        filter="url(#glow)"/>

    <polygon
        points="60,30 76,60 60,90 44,60"
        fill="#58A6FF"/>

</svg>